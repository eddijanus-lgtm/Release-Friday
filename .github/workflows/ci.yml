name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Spotify importer syntax
        run: node --check scripts/import-spotify-release.mjs
      - name: Build
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_SUPABASE_URL: "https://otjvkorslczqdpzltjpj.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_D4obxn3HjR_CRpmj-9W1Aw_A9IabI4_"
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$status" >> "$GITHUB_ENV"
          exit 0
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log
          if-no-files-found: error
      - name: Fail when build failed
        if: env.BUILD_EXIT_CODE != '0'
        run: exit 1
