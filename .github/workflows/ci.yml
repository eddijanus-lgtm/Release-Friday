name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Spotify importer syntax
        run: node --check scripts/import-spotify-release.mjs
      - name: Build
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_SUPABASE_URL: "https://otjvkorslczqdpzltjpj.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_D4obxn3HjR_CRpmj-9W1Aw_A9IabI4_"
        run: npm run build
