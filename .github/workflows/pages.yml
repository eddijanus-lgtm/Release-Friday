name: Deploy preview to GitHub Pages

on:
  push:
    branches: ["agent/project-structure"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: github-pages
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static export
        run: |
          if npm run build > /tmp/pages-build.log 2>&1; then
            cat /tmp/pages-build.log
          else
            {
              echo "❌ **GitHub Pages build failed**"
              echo
              echo '```text'
              tail -n 80 /tmp/pages-build.log
              echo '```'
            } > /tmp/pages-build-failure.md
            gh pr comment 1 --repo "$GITHUB_REPOSITORY" --body-file /tmp/pages-build-failure.md
            cat /tmp/pages-build.log
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment status on PR
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            gh pr comment 1 --repo "$GITHUB_REPOSITORY" --body "✅ Permanent GitHub Pages preview deployed: ${PAGE_URL:-https://eddijanus-lgtm.github.io/Release-Friday/}"
          elif [ "$BUILD_RESULT" != "success" ]; then
            echo "Build failed; detailed log was posted by the build job."
          else
            gh pr comment 1 --repo "$GITHUB_REPOSITORY" --body "⚠️ GitHub Pages deploy step failed after a successful build. Check Settings → Pages and confirm Source: GitHub Actions."
          fi
