name: Deploy preview to GitHub Pages

on:
  push:
    branches: ["agent/project-structure"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build static export
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment status on PR
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            gh pr comment 1 --repo "$GITHUB_REPOSITORY" --body "✅ Permanent GitHub Pages preview deployed: ${PAGE_URL:-https://eddijanus-lgtm.github.io/Release-Friday/}"
          else
            gh pr comment 1 --repo "$GITHUB_REPOSITORY" --body "⚠️ GitHub Pages deployment did not complete. Build: $BUILD_RESULT · Deploy: $DEPLOY_RESULT. Open Settings → Pages and select Source: GitHub Actions once, then rerun the workflow."
          fi
