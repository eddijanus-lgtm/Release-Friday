name: Apply Spotify pre-save patch

on:
  push:
    branches: ["feature/spotify-presave"]
    paths:
      - "scripts/apply-presave-patch.mjs"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/spotify-presave

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply patch
        run: node scripts/apply-presave-patch.mjs

      - name: Commit patched app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/prototype-client.tsx app/globals.css types/release.ts scripts/apply-presave-patch.mjs .github/workflows/apply-presave-patch.yml
          git commit -m "Add verified Spotify pre-save support"
          git push origin feature/spotify-presave
