name: Import Spotify release

on:
  workflow_dispatch:
    inputs:
      spotify_release:
        description: "Spotify album/prerelease URL or 22-character ID"
        required: true
        type: string
      country:
        description: "Editorial country"
        required: true
        default: "DE"
        type: choice
        options:
          - DE
          - US
      status:
        description: "Supabase status"
        required: true
        default: "published"
        type: choice
        options:
          - published
          - draft
      release_date:
        description: "Optional prerelease date (YYYY-MM-DD)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "imports/spotify-release-request.json"
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: spotify-release-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate importer syntax
        run: |
          node --check scripts/import-spotify-release.mjs
          node --check scripts/import-spotify-prerelease.mjs

      - name: Resolve import request
        shell: bash
        env:
          DISPATCH_RELEASE: ${{ inputs.spotify_release }}
          DISPATCH_COUNTRY: ${{ inputs.country }}
          DISPATCH_STATUS: ${{ inputs.status }}
          DISPATCH_RELEASE_DATE: ${{ inputs.release_date }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SPOTIFY_RELEASE=$DISPATCH_RELEASE" >> "$GITHUB_ENV"
            echo "RELEASE_COUNTRY=$DISPATCH_COUNTRY" >> "$GITHUB_ENV"
            echo "RELEASE_STATUS=$DISPATCH_STATUS" >> "$GITHUB_ENV"
            echo "RELEASE_DATE=$DISPATCH_RELEASE_DATE" >> "$GITHUB_ENV"
          else
            node <<'NODE' >> "$GITHUB_ENV"
          const request = require('./imports/spotify-release-request.json');
          const requestedAt = Date.parse(request.requested_at || '');
          const ageHours = Number.isFinite(requestedAt) ? (Date.now() - requestedAt) / 3_600_000 : 0;

          console.log(`SPOTIFY_RELEASE=${request.spotify_release}`);
          console.log(`RELEASE_COUNTRY=${request.country || 'DE'}`);
          console.log(`RELEASE_STATUS=${request.status || 'published'}`);
          console.log(`RELEASE_DATE=${request.release_date || ''}`);

          if (process.env.GITHUB_EVENT_NAME === 'schedule' && ageHours > 6) {
            console.log('SKIP_IMPORT=true');
          }
          NODE
          fi

      - name: Import Spotify release into Supabase
        if: env.SKIP_IMPORT != 'true'
        shell: bash
        run: |
          if [[ "$SPOTIFY_RELEASE" == *"/prerelease/"* ]]; then
            node scripts/import-spotify-prerelease.mjs "$SPOTIFY_RELEASE"
          else
            node scripts/import-spotify-release.mjs "$SPOTIFY_RELEASE"
          fi

      - name: Skip stale scheduled request
        if: env.SKIP_IMPORT == 'true'
        run: echo "Scheduled fallback skipped because the request is older than six hours."
