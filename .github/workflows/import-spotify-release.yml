name: Import Spotify release

on:
  workflow_dispatch:
    inputs:
      queue_request_id:
        description: "Optional Supabase queue request UUID"
        required: false
        type: string
      spotify_release:
        description: "Spotify album/prerelease URL or 22-character ID"
        required: false
        type: string
      country:
        description: "Editorial country"
        required: false
        default: "DE"
        type: choice
        options:
          - DE
          - US
      status:
        description: "Supabase status"
        required: false
        default: "published"
        type: choice
        options:
          - published
          - draft
      release_date:
        description: "Optional prerelease date (YYYY-MM-DD)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "imports/spotify-release-request.json"

permissions:
  contents: read

concurrency:
  group: spotify-release-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate importer syntax
        run: |
          node --check scripts/import-spotify-release.mjs
          node --check scripts/import-spotify-prerelease.mjs
          node --check scripts/process-release-import-queue.mjs

      - name: Process dispatched Custom GPT import
        if: github.event_name == 'workflow_dispatch' && inputs.queue_request_id != ''
        env:
          IMPORT_REQUEST_ID: ${{ inputs.queue_request_id }}
        run: node scripts/process-release-import-queue.mjs

      - name: Resolve direct import request
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.queue_request_id == '')
        shell: bash
        env:
          DISPATCH_RELEASE: ${{ inputs.spotify_release }}
          DISPATCH_COUNTRY: ${{ inputs.country }}
          DISPATCH_STATUS: ${{ inputs.status }}
          DISPATCH_RELEASE_DATE: ${{ inputs.release_date }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$DISPATCH_RELEASE" ]]; then
              echo "::error::spotify_release is required when queue_request_id is empty"
              exit 1
            fi
            echo "SPOTIFY_RELEASE=$DISPATCH_RELEASE" >> "$GITHUB_ENV"
            echo "RELEASE_COUNTRY=${DISPATCH_COUNTRY:-DE}" >> "$GITHUB_ENV"
            echo "RELEASE_STATUS=${DISPATCH_STATUS:-published}" >> "$GITHUB_ENV"
            echo "RELEASE_DATE=$DISPATCH_RELEASE_DATE" >> "$GITHUB_ENV"
          else
            node <<'NODE' >> "$GITHUB_ENV"
          const request = require('./imports/spotify-release-request.json');
          console.log(`SPOTIFY_RELEASE=${request.spotify_release}`);
          console.log(`RELEASE_COUNTRY=${request.country || 'DE'}`);
          console.log(`RELEASE_STATUS=${request.status || 'published'}`);
          console.log(`RELEASE_DATE=${request.release_date || ''}`);
          NODE
          fi

      - name: Import direct Spotify release into Supabase
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.queue_request_id == '')
        shell: bash
        run: |
          if [[ "$SPOTIFY_RELEASE" == *"/prerelease/"* ]]; then
            node scripts/import-spotify-prerelease.mjs "$SPOTIFY_RELEASE"
          else
            node scripts/import-spotify-release.mjs "$SPOTIFY_RELEASE"
          fi
