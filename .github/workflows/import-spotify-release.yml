name: Import Spotify release

on:
  workflow_dispatch:
    inputs:
      spotify_release:
        description: "Spotify album URL or 22-character album ID"
        required: true
        type: string
      country:
        description: "Editorial country"
        required: true
        default: "DE"
        type: choice
        options:
          - DE
          - US
      status:
        description: "Supabase status"
        required: true
        default: "published"
        type: choice
        options:
          - published
          - draft
  push:
    branches:
      - main
    paths:
      - "imports/spotify-release-request.json"

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve import request
        shell: bash
        env:
          DISPATCH_RELEASE: ${{ inputs.spotify_release }}
          DISPATCH_COUNTRY: ${{ inputs.country }}
          DISPATCH_STATUS: ${{ inputs.status }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SPOTIFY_RELEASE=$DISPATCH_RELEASE" >> "$GITHUB_ENV"
            echo "RELEASE_COUNTRY=$DISPATCH_COUNTRY" >> "$GITHUB_ENV"
            echo "RELEASE_STATUS=$DISPATCH_STATUS" >> "$GITHUB_ENV"
          else
            node <<'NODE' >> "$GITHUB_ENV"
          const request = require('./imports/spotify-release-request.json');
          console.log(`SPOTIFY_RELEASE=${request.spotify_release}`);
          console.log(`RELEASE_COUNTRY=${request.country || 'DE'}`);
          console.log(`RELEASE_STATUS=${request.status || 'published'}`);
          NODE
          fi

      - name: Import Spotify album into Supabase
        run: node scripts/import-spotify-release.mjs "$SPOTIFY_RELEASE"
