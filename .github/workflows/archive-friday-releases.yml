name: Archive Friday releases

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: Optional Friday to archive (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    # Sunday 00:01 Europe/Berlin (two UTC slots cover summer and winter time).
    - cron: "1 22 * * 6"
    - cron: "1 23 * * 6"

permissions:
  contents: read

concurrency:
  group: "archive-friday-releases"
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_DATE: ${{ inputs.release_date }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Berlin archive window
        id: schedule-window
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" || "$(TZ=Europe/Berlin date +%u-%H-%M)" == "7-00-01" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node.js
        if: steps.schedule-window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        if: steps.schedule-window.outputs.run == 'true'
        run: npm ci
      - name: Archive the previous Friday
        if: steps.schedule-window.outputs.run == 'true'
        run: node scripts/archive-friday-releases.mjs
