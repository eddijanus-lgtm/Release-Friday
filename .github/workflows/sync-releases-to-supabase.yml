name: Sync releases to Supabase

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: Optional release date in YYYY-MM-DD format
        required: false
        type: string
      allow_spotify_artist_image_fallback:
        description: Use an exact Spotify artist image when no release cover is available
        required: false
        default: false
        type: boolean
      refresh_artist_image_covers:
        description: Replace stored artist images with release covers when available
        required: false
        default: false
        type: boolean
  schedule:
    # 14:15 CEST: New Zealand has reached Friday and exposes rolling releases.
    - cron: "15 12 * * 4"
    # 18:30 CEST: retry after the weekly r/GermanRap post is normally available.
    - cron: "30 16 * * 4"
    # Friday recovery run after the German release window has opened.
    - cron: "15 5 * * 5"
    # 00:02 Europe/Berlin cover refresh (two UTC slots handle daylight saving time).
    - cron: "2 22 * * 4"
    - cron: "2 23 * * 4"
  push:
    branches:
      - main
    paths:
      - "scripts/fetch-releases.mjs"
      - "scripts/release-sync-policy.mjs"
      - "scripts/sync-releases-to-supabase.mjs"
      - "lib/releases/curated-releases.json"
      - "lib/releases/reddit-source.json"
      - ".github/workflows/sync-releases-to-supabase.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_DATE: ${{ inputs.release_date }}
      ALLOW_SPOTIFY_ARTIST_IMAGE_FALLBACK: ${{ inputs.allow_spotify_artist_image_fallback || (github.event_name == 'schedule' && (github.event.schedule == '30 16 * * 4' || github.event.schedule == '15 5 * * 5')) }}
      REFRESH_ARTIST_IMAGE_COVERS: ${{ inputs.refresh_artist_image_covers || github.event_name == 'push' || (github.event_name == 'schedule' && (github.event.schedule == '2 22 * * 4' || github.event.schedule == '2 23 * * 4')) }}
      SKIP_DISCOVERY: ${{ inputs.refresh_artist_image_covers || github.event_name == 'push' || (github.event_name == 'schedule' && (github.event.schedule == '2 22 * * 4' || github.event.schedule == '2 23 * * 4')) }}
      GITHUB_TRIGGER_EVENT: ${{ github.event_name }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Berlin midnight refresh window
        id: schedule-window
        shell: bash
        run: |
          if [[ "$REFRESH_ARTIST_IMAGE_COVERS" != "true" || "$GITHUB_TRIGGER_EVENT" != "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$(TZ=Europe/Berlin date +%u-%H)" == "5-00" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.schedule-window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.schedule-window.outputs.run == 'true'
        run: npm ci

      - name: Fetch upcoming releases
        if: steps.schedule-window.outputs.run == 'true'
        run: node scripts/fetch-releases.mjs

      - name: Sync new releases to Supabase
        if: steps.schedule-window.outputs.run == 'true'
        run: node scripts/sync-releases-to-supabase.mjs
