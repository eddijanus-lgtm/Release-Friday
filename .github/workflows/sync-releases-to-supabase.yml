name: Sync releases to Supabase

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: Optional release date in YYYY-MM-DD format
        required: false
        type: string
  schedule:
    # 14:15 CEST: New Zealand has reached Friday and exposes rolling releases.
    - cron: "15 12 * * 4"
    # 18:30 CEST: retry after the weekly r/GermanRap post is normally available.
    - cron: "30 16 * * 4"
    # Friday recovery run after the German release window has opened.
    - cron: "15 5 * * 5"
  push:
    branches:
      - main
    paths:
      - "scripts/fetch-releases.mjs"
      - "scripts/sync-releases-to-supabase.mjs"
      - "lib/releases/reddit-source.json"
      - ".github/workflows/sync-releases-to-supabase.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_DATE: ${{ inputs.release_date }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SUPABASE_URL: https://otjvkorslczqdpzltjpj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch upcoming releases
        run: node scripts/fetch-releases.mjs

      - name: Sync new releases to Supabase
        run: node scripts/sync-releases-to-supabase.mjs
